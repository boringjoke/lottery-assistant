spring:
  application:
    name: lottery-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${LOTTERY_DB_URL:jdbc:mysql://127.0.0.1:3306/lottery_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${LOTTERY_DB_USERNAME:lottery}
    password: ${LOTTERY_DB_PASSWORD:lottery1991.}
  data:
    redis:
      host: ${LOTTERY_REDIS_HOST:127.0.0.1}
      port: ${LOTTERY_REDIS_PORT:6379}
      password: ${LOTTERY_REDIS_PASSWORD:}
      database: ${LOTTERY_REDIS_DATABASE:1}
      timeout: ${LOTTERY_REDIS_TIMEOUT:3s}
      connect-timeout: ${LOTTERY_REDIS_CONNECT_TIMEOUT:3s}
  flyway:
    enabled: ${LOTTERY_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

lottery:
  crawler:
    base-url: ${LOTTERY_CRAWLER_BASE_URL:http://127.0.0.1:8000}
    connect-timeout-millis: ${LOTTERY_CRAWLER_CONNECT_TIMEOUT_MILLIS:3000}
    read-timeout-millis: ${LOTTERY_CRAWLER_READ_TIMEOUT_MILLIS:10000}
  sync:
    core-pool-size: ${LOTTERY_SYNC_CORE_POOL_SIZE:1}
    max-pool-size: ${LOTTERY_SYNC_MAX_POOL_SIZE:1}
    queue-capacity: ${LOTTERY_SYNC_QUEUE_CAPACITY:10}
    default-page-delay-millis: ${LOTTERY_SYNC_DEFAULT_PAGE_DELAY_MILLIS:2000}
    task-delay-millis: ${LOTTERY_SYNC_TASK_DELAY_MILLIS:10000}
    max-pages-per-task: ${LOTTERY_SYNC_MAX_PAGES_PER_TASK:20}
    auto-latest:
      enabled: ${LOTTERY_SYNC_AUTO_LATEST_ENABLED:true}
      cron: ${LOTTERY_SYNC_AUTO_LATEST_CRON:36 29 11 * * *}
      zone: ${LOTTERY_SYNC_AUTO_LATEST_ZONE:Asia/Shanghai}
  auth:
    session-ttl-seconds: ${LOTTERY_AUTH_SESSION_TTL_SECONDS:604800}
  favorite:
    max-active-count: ${LOTTERY_FAVORITE_MAX_ACTIVE_COUNT:100}
  mail:
    enabled: ${LOTTERY_MAIL_ENABLED:true}
    host: ${LOTTERY_MAIL_HOST:smtp.qq.com}
    port: ${LOTTERY_MAIL_PORT:465}
    username: ${LOTTERY_MAIL_USERNAME:1677319699@qq.com}
    password: ${LOTTERY_MAIL_PASSWORD:dfjtcrxulvflceeb}
    from: ${LOTTERY_MAIL_FROM:1677319699@qq.com}
    auth: ${LOTTERY_MAIL_AUTH:true}
    ssl-enabled: ${LOTTERY_MAIL_SSL_ENABLED:true}
    starttls-enabled: ${LOTTERY_MAIL_STARTTLS_ENABLED:false}
    connect-timeout-millis: ${LOTTERY_MAIL_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${LOTTERY_MAIL_READ_TIMEOUT_MILLIS:10000}

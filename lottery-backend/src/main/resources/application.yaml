spring:
  application:
    name: lottery-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: ${LOTTERY_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

lottery:
  sync:
    core-pool-size: ${LOTTERY_SYNC_CORE_POOL_SIZE:1}
    max-pool-size: ${LOTTERY_SYNC_MAX_POOL_SIZE:1}
    queue-capacity: ${LOTTERY_SYNC_QUEUE_CAPACITY:10}
    default-page-delay-millis: ${LOTTERY_SYNC_DEFAULT_PAGE_DELAY_MILLIS:2000}
    task-delay-millis: ${LOTTERY_SYNC_TASK_DELAY_MILLIS:10000}
    max-pages-per-task: ${LOTTERY_SYNC_MAX_PAGES_PER_TASK:20}
  auth:
    session-ttl-seconds: ${LOTTERY_AUTH_SESSION_TTL_SECONDS:604800}
  favorite:
    max-active-count: ${LOTTERY_FAVORITE_MAX_ACTIVE_COUNT:100}
